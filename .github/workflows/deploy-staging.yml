name: Deploy Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    environment:
      name: staging
    env:
      SLACK_WEBHOOK: ${{ secrets.STAGING_SLACK_WEBHOOK }}
      PAGERDUTY_ROUTING_KEY: ${{ secrets.STAGING_PAGERDUTY_ROUTING_KEY }}

    steps:
      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_DIR }}"

            PREV_COMMIT=$(git rev-parse HEAD)
            HEALTH_URL="${{ secrets.STAGING_HEALTHCHECK_URL || 'http://localhost/health' }}"
            METRICS_URL="${{ secrets.STAGING_METRICS_URL || 'http://localhost/metrics' }}"
            APP_BASE_URL="${{ secrets.STAGING_APP_BASE_URL || 'http://localhost:8000' }}"

            git pull --ff-only origin main
            docker compose -f docker/docker-compose.yml up -d --build

            for i in $(seq 1 12); do
              if curl -fsS "$HEALTH_URL" > /dev/null; then
                echo "Health check passed: $HEALTH_URL"

                if curl -fsS "$METRICS_URL" > /dev/null; then
                  echo "Smoke check passed: $METRICS_URL"
                else
                  echo "Smoke check failed: $METRICS_URL"
                  break
                fi

                docker compose -f docker/docker-compose.yml exec -T backend python seed_ui_users.py
                docker compose -f docker/docker-compose.yml exec -T \
                  -e EDULINK_BASE_URL="$APP_BASE_URL" \
                  backend python role_api_smoke.py

                docker compose -f docker/docker-compose.yml ps
                exit 0
              fi
              echo "Health check retry ($i/12): $HEALTH_URL"
              sleep 10
            done

            echo "Health check failed. Rolling back to $PREV_COMMIT"
            git checkout "$PREV_COMMIT"
            docker compose -f docker/docker-compose.yml up -d --build
            git checkout main
            exit 1

      - name: Notify Slack on success
        if: success()
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H "Content-type: application/json" \
              --data "{\"text\":\"[EduLink] Staging deploy succeeded: ${{ github.sha }}\"}" \
              "$SLACK_WEBHOOK"
          else
            echo "STAGING_SLACK_WEBHOOK is not set; skip success notification."
          fi

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H "Content-type: application/json" \
              --data "{\"text\":\"[EduLink] Staging deploy failed (rollback attempted): ${{ github.sha }} | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK"
          else
            echo "STAGING_SLACK_WEBHOOK is not set; skip failure notification."
          fi

      - name: Notify PagerDuty on staging failure
        if: failure()
        run: |
          if [ -n "$PAGERDUTY_ROUTING_KEY" ]; then
            curl -X POST -H "Content-type: application/json" \
              --data "{\"routing_key\":\"$PAGERDUTY_ROUTING_KEY\",\"event_action\":\"trigger\",\"payload\":{\"summary\":\"EduLink staging deploy failed\",\"severity\":\"warning\",\"source\":\"github-actions\",\"custom_details\":{\"sha\":\"${{ github.sha }}\",\"run\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}}" \
              "https://events.pagerduty.com/v2/enqueue"
          else
            echo "STAGING_PAGERDUTY_ROUTING_KEY is not set; skip PagerDuty notification."
          fi

      - name: Create or update staging incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = process.env.GITHUB_SHA;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const title = `[Incident] Staging deploy failed - ${sha.slice(0, 7)}`;
            const body = [
              '## Incident Summary',
              '- Environment: staging',
              `- Commit: ${sha}`,
              `- Workflow run: ${runUrl}`,
              '',
              '## Initial Actions',
              '- [ ] Confirm rollback status from workflow logs',
              '- [ ] Validate `/health` and `/metrics` endpoints',
              '- [ ] Start postmortem if production impact is detected',
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,staging',
              per_page: 100,
            });

            const matched = existing.find((issue) => issue.title === title);

            if (matched) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matched.number,
                body: [
                  '## New Failure Occurrence',
                  `- Commit: ${sha}`,
                  `- Workflow run: ${runUrl}`,
                ].join('\n'),
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'staging'],
              });
            }
