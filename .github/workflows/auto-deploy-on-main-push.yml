name: Auto Deploy on Main Push

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate-and-report:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.test.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        id: test
        run: |
          python -m pytest backend/tests -v --tb=short
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            backend/tests/
            .pytest_cache/

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: validate-and-report
    if: needs.validate-and-report.outputs.status == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

  post-status:
    runs-on: ubuntu-latest
    if: always()
    needs: [validate-and-report, build-and-push-image]

    steps:
      - name: Check job status
        run: |
          echo "Test Status: ${{ needs.validate-and-report.outputs.status }}"
          echo "Build Status: ${{ needs.build-and-push-image.result }}"

      - name: Create workflow summary
        run: |
          echo "## Auto Sprint Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.validate-and-report.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-and-push-image.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
