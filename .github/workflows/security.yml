name: EduLink Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-and-code-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit==2.7.3 bandit==1.7.9

      - name: Run dependency vulnerability scan (pip-audit)
        run: |
          pip-audit -r backend/requirements.txt --progress-spinner off

      - name: Run static security scan (bandit)
        run: |
          bandit -r backend -x backend/tests,backend/__pycache__ -ll
