# Prometheus 설정 파일
# EduLink 메트릭 수집 설정

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'edulink-monitor'

scrape_configs:
  # Flask 애플리케이션 메트릭
  - job_name: 'edulink-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Nginx (필요시)
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['localhost:9113']

# 알람 규칙 (선택사항)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - "alert_rules.yml"
