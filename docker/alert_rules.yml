groups:
  - name: edulink-backend-alerts
    rules:
      - alert: EduLinkHigh5xxErrorRate
        expr: |
          (
            sum(rate(edulink_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(edulink_http_requests_total[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "EduLink 5xx 에러율 증가"
          description: "최근 10분 동안 5xx 비율이 5%를 초과했습니다."

      - alert: EduLinkHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(edulink_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.0
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "EduLink 응답 지연 증가"
          description: "P95 응답시간이 1초를 초과한 상태가 10분 이상 지속됩니다."

      - alert: EduLinkAuthFailureSpike
        expr: sum(rate(edulink_auth_attempts_total{result="failure"}[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
          service: auth
        annotations:
          summary: "인증 실패 급증"
          description: "인증 실패율이 임계치를 초과했습니다. 계정 공격 가능성을 확인하세요."

      - alert: EduLinkPasswordResetFailureSpike
        expr: sum(rate(edulink_password_reset_attempts_total{result="failure"}[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          service: auth
        annotations:
          summary: "비밀번호 재설정 실패 증가"
          description: "비밀번호 재설정 실패가 비정상적으로 증가했습니다."
